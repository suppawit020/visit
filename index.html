<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C9082">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="style.css?v=10">
</head>

<body>

    <div class="app">

        <div class="header">
            <h1>Checklist</h1>
            <span class="rec-badge" id="rec-count">0 records</span>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('profile')">Profile</div>
            <div class="tab" onclick="switchTab('new')">New Visit</div>
            <div class="tab" onclick="switchTab('list')">All Visits</div>
        </div>

        <div id="tab-profile">
            <div class="card">
                <div class="section-title">My Profile</div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Real Name</label>
                        <input type="text" id="pf-name" placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group full">
                        <label>Email</label>
                        <input type="email" id="pf-email" placeholder="e.g. john@example.com">
                    </div>
                    <div class="form-group full">
                        <label>Your Position</label>
                        <input type="text" id="pf-position" placeholder="e.g. Sales Executive">
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn-primary" onclick="saveProfile()">Save Profile</button>
            </div>
        </div>

        <div id="tab-new" style="display:none">
            <div class="card">
                <div class="section-title">Visit Information</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Outlet Name <span class="req">*</span></label>
                        <input type="text" id="f-outlet" placeholder="e.g. The Empire Bar">
                    </div>
                    <div class="form-group">
                        <label>Area <span class="req">*</span></label>
                        <select id="f-area">
                            <option value="">Select area</option>
                            <option>BKK</option>
                            <option>NORTH</option>
                            <option>NORTHEAST</option>
                            <option>WEST</option>
                            <option>EAST</option>
                            <option>SOUTH</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Person You Met <span class="req">*</span></label>
                        <input type="text" id="f-person" placeholder="Full name">
                    </div>
                    <div class="form-group">
                        <label>Their Position <span class="req">*</span></label>
                        <select id="f-position">
                            <option value="">Select position</option>
                            <option>CEO</option>
                            <option>CFO</option>
                            <option>OWNER</option>
                            <option>BARTENDER</option>
                            <option>F&amp;B MANAGER</option>
                            <option>MANAGER</option>
                            <option value="__other__">ETC — Please Type</option>
                        </select>
                    </div>
                    <div class="form-group full" id="pos-other-wrap" style="display:none">
                        <label>Specify Position <span class="req">*</span></label>
                        <input type="text" id="f-pos-other" placeholder="Enter position">
                    </div>
                    <div class="form-group">
                        <label>Visit Date <span class="req">*</span></label>
                        <input type="date" id="f-date" lang="en-US">
                    </div>
                    <div class="form-group full">
                        <label>Reason for Visit <span class="req">*</span></label>
                        <textarea id="f-reason" rows="2" placeholder="Purpose of this visit..."></textarea>
                    </div>

                    <div class="form-group full">
                        <label>Result of Visit <span class="req" id="result-req-star">*</span></label>
                        <textarea id="f-result" rows="2" placeholder="Outcomes, agreements, follow-ups..."></textarea>
                    </div>

                    <div class="form-group full" style="margin-top: 8px;">
                        <label>Follow-up Actions <span style="color:var(--text-muted); font-weight:normal;">(Optional)</span></label>
                        <div class="checkbox-grid">
                            <label class="cb-label"><input type="checkbox" class="f-followup" value="Send Quotation / Documents"> Send Quotation/Docs</label>
                            <label class="cb-label"><input type="checkbox" class="f-followup" value="Call Back Later"> Call Back Later</label>
                            <label class="cb-label"><input type="checkbox" id="cb-next-visit" class="f-followup" value="Schedule Next Visit"> Schedule Next Visit</label>
                        </div>
                        <div id="next-visit-wrap" style="display: none; margin-top: 10px; background: #F0F4F1; padding: 12px; border-radius: 8px; border: 1px solid #D1E0D5; width: 100%; box-sizing: border-box; overflow: hidden;">
                            <label style="font-size: 12px; color: var(--primary); display: block; margin-bottom: 6px;">Select Date for Next Visit:</label>
                            <input type="date" id="f-next-date" lang="en-US" style="border-color: #B5CCBD; width: 100%; box-sizing: border-box; display: block; margin: 0;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title" style="display: flex; justify-content: space-between;">
                    <span>Live Evidence</span>
                    <span id="photo-counter" style="color: var(--primary); font-weight: 600;">0 / 10</span>
                </div>

                <div class="easy-camera-container">
                    <button class="btn-open-camera" id="btn-start-cam" onclick="startCamera()" type="button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        OPEN CAMERA
                    </button>
                    <p style="font-size: 12px; color: #888; margin-top: 12px;">Capture live photos directly from your device</p>

                    <div class="captured-section" id="captured-section" style="display: none;">
                        <div class="captured-title">Captured Photos (Click to view)</div>
                        <div class="photo-previews" id="previews"></div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn-secondary" id="btn-clear" onclick="clearForm()">Clear</button>
                <button class="btn-primary" id="btn-save" onclick="triggerSaveConfirm()">Save Visit</button>
            </div>
        </div>

        <div id="tab-list" style="display:none">
            <div class="filters">
                <select class="filter-select" id="fl-area" onchange="renderList()">
                    <option value="">All areas</option>
                    <option>BKK</option><option>NORTH</option><option>NORTHEAST</option><option>WEST</option><option>EAST</option><option>SOUTH</option>
                </select>
                <select class="filter-select" id="fl-pos" onchange="renderList()">
                    <option value="">All positions</option>
                    <option>CEO</option><option>CFO</option><option>OWNER</option><option>BARTENDER</option><option>F&amp;B MANAGER</option><option>MANAGER</option>
                </select>
                <input class="filter-select" type="text" id="fl-search" placeholder="Search outlet..." oninput="renderList()" style="flex: 1; min-width:140px">
            </div>
            <div class="visit-list" id="visit-list"></div>
            <div id="load-more-wrap" style="text-align: center; margin-top: 1rem; display: none;">
                <button class="btn-secondary" onclick="loadMoreVisits()">Load More</button>
            </div>
        </div>

    </div>

    <div class="camera-modal" id="camera-modal">
        <div class="camera-header">
            <span id="modal-photo-counter" style="color: #FFF; font-weight: 500; font-size: 14px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 12px;">0 / 10</span>
            <button class="btn-close-modal" onclick="stopCamera()">Done</button>
        </div>
        <div class="camera-body">
            <video id="camera-view" autoplay playsinline></video>
        </div>
        <div class="camera-footer">
            <button class="btn-capture-round" onclick="capturePhoto()"></button>
        </div>
        <canvas id="camera-canvas" style="display: none;"></canvas>
    </div>

    <div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-box">
            <button class="detail-close" onclick="closeDetail()">✕</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <div class="confirm-overlay" id="save-confirm-overlay" onclick="if(event.target===this)closeSaveConfirm()">
        <div class="confirm-box" style="padding: 1.5rem; max-width: 480px;">
            <h3 style="margin-bottom: 1rem; color: var(--text-main); font-size: 16px; font-weight: 600;">Review Visit Details</h3>
            <div id="save-confirm-text" style="margin-bottom: 1.5rem; text-align: left;"></div>
            <div class="confirm-actions">
                <button class="btn-secondary" onclick="closeSaveConfirm()">Edit</button>
                <button class="btn-primary" onclick="executeSave()">Confirm & Save</button>
            </div>
        </div>
    </div>

    <div class="confirm-overlay" id="delete-confirm-overlay" onclick="if(event.target===this)closeDeleteRequest()">
        <div class="confirm-box">
            <h3 style="margin-bottom: 12px; font-size: 18px; color: #D48A8A;">Delete Request</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 12px;">Reason for delete request:</p>
            <textarea id="delete-reason-input" rows="3" placeholder="e.g., Duplicated entry, wrong outlet..." style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 14px; resize: none;"></textarea>
            <div class="confirm-actions">
                <button class="btn-secondary" onclick="closeDeleteRequest()">Cancel</button>
                <button class="btn-primary btn-danger" onclick="executeDeleteRequest()">Confirm Delete Request</button>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img id="lb-img" src="" alt="Photo">
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=9"></script>
</body>

</html>
